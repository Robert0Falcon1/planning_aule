version: '3.8'

services:
  # Database MySQL - Ottimizzato per basso consumo RAM
  # Database MySQL - Ottimizzato per basso consumo RAM
  db:
    image: mysql:8.0
    container_name: planning_aule_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - planning_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # SPOSTATO QUI (Allo stesso livello di healthcheck, non dentro)
    command: 
      - mysqld
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
      - --innodb-buffer-pool-size=64M
      - --innodb-log-buffer-size=8M
      - --performance-schema=OFF
      - --max-connections=50
    deploy:
      resources:
        limits:
          memory: 300M

  phpmyadmin:
    image: phpmyadmin
    container_name: planning_aule_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    networks:
      - planning_network
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 128M

  # Backend FastAPI - Pulito e limitato
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planning_aule_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    ports:
      - "8000:8000"
    networks:
      - planning_network
    deploy:
      resources:
        limits:
          memory: 150M
      
  # Frontend Vue + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: planning_aule_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - planning_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  planning_network:
    driver: bridge

volumes:
  mysql_data: